{
  "app": {
    "name": "AURA",
    "offline_mode": true,
    "log_level": "INFO"
  },
  "models": {
    "primary": {
      "provider": "ollama",
      "name": "llama3.1:8b-instruct",
      "host": "http://127.0.0.1:11434"
    },
    "fallbacks": [
      {
        "provider": "ollama",
        "name": "mistral:7b-instruct",
        "host": "http://127.0.0.1:11434"
      },
      {
        "provider": "ollama",
        "name": "qwen2:7b-instruct",
        "host": "http://127.0.0.1:11434"
      }
    ]
  },
  "paths": {
    "allowed_roots": [
      "./",
      "./var/data"
    ],
    "data_dir": "./var/data",
    "log_dir": "./var/logs",
    "memory_dir": "./var/memory",
    "ipc_socket": "./var/run/aura.sock"
  },
  "features": {
    "hotkey": true,
    "tray": true,
    "ipc": true,
    "api": true
  },
  "auth": {
    "enabled": false,
    "secret": "change-me"
  },
  "router": {
    "default_importance": 2,
    "ensemble_providers": 4,
    "max_tokens_default": 4096,
    "temperature_default": 0.7,
    "fallback_to_openrouter_auto": true,
    "quota_db": "./var/data/quota.db",
    "providers": {
      "groq": {"enabled": true, "api_key_env": "GROQ_API_KEY"},
      "openrouter": {"enabled": true, "api_key_env": "OPENROUTER_API_KEY", "site_url": "https://aura-agent.hf.space", "site_name": "AURA Agent"},
      "cerebras": {"enabled": true, "api_key_env": "CEREBRAS_API_KEY"},
      "gemini": {"enabled": true, "api_key_env": "GEMINI_API_KEY"},
      "mistral": {"enabled": true, "api_key_env": "MISTRAL_API_KEY"},
      "cloudflare": {"enabled": true, "api_key_env": "CF_API_TOKEN", "account_id_env": "CF_ACCOUNT_ID"},
      "xai": {"enabled": true, "api_key_env": "XAI_API_KEY"}
    }
  },
  "ensemble": {
    "enabled": true,
    "default_importance_threshold": 2,
    "models": [
      "llama3.1:8b-instruct",
      "mistral:7b-instruct",
      "gemma2:9b-instruct",
      "qwen2:7b-instruct"
    ],
    "judge_model": "llama3.1:8b-instruct",
    "model_timeout_seconds": 60,
    "min_successful_responses": 2,
    "fallback_to_single": true
  },
  "lyra": {
    "enabled": true,
    "voice_mode": false,
    "stt_model": "base",
    "wake_word_engine": "energy_threshold",
    "wake_phrase": "hey aura",
    "wake_sensitivity": 0.5,
    "tts_rate": 175,
    "tts_volume": 0.9,
    "save_audio": false,
    "noise_reduction": true
  },
  "ui": {
    "enabled": true,
    "host": "127.0.0.1",
    "port": 7860,
    "open_browser_on_start": false
  },
  "stream": {
    "enabled": true,
    "fetch_interval_hours": 6,
    "min_relevance_score": 0.4,
    "sources": [
      {"name": "ArXiv AI/ML", "type": "arxiv", "query": "large language model transformer"},
      {"name": "ArXiv Efficient Training", "type": "arxiv", "query": "LoRA fine-tuning efficient training"},
      {"name": "HackerNews AI", "type": "hackernews", "query": "LLM machine learning"},
      {"name": "PyTorch Releases", "type": "pypi", "query": "torch transformers"},
      {"name": "Kaggle Competitions", "type": "kaggle", "query": ""}
    ]
  }
}
