name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config --global user.email "aura-sync-bot@github.com"
          git config --global user.name "AURA Sync Bot"

      - name: Remove runtime binary files
        run: |
          find . -name '*.db' -delete
          find . -name '*.sqlite' -delete
          find . -name '*.sqlite3' -delete
          rm -rf ./aura/var/data/chroma
          rm -rf ./aura/var/data/models
          mkdir -p ./aura/var/data
          touch ./aura/var/data/.gitkeep

      - name: Create orphan commit (no binary history)
        run: |
          # Squash everything into a single root commit so HF
          # never sees any old binary blobs from git history
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "chore: deploy to HuggingFace Space"

      - name: Push orphan branch to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Arko007:${HF_TOKEN}@huggingface.co/spaces/Arko007/AI-agent
          git push hf hf-deploy:main --force
