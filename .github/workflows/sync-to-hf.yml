name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Remove runtime binary files before HF push
        run: |
          # Remove all SQLite/binary runtime data files that HF rejects
          find . -path './aura/var/data/*.db' -delete
          find . -path './aura/var/data/*.sqlite3' -delete
          find . -path './aura/var/data/*.sqlite' -delete
          rm -rf ./aura/var/data/chroma
          rm -rf ./aura/var/data/models
          # Ensure var/data dir still exists so AURA can write to it at runtime
          mkdir -p ./aura/var/data
          touch ./aura/var/data/.gitkeep
          git config --global user.email "aura-sync-bot@github.com"
          git config --global user.name "AURA Sync Bot"
          git add -A
          git diff --staged --quiet || git commit -m "chore: strip runtime data before HF sync [skip ci]"

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Arko007:${HF_TOKEN}@huggingface.co/spaces/Arko007/AI-agent
          git push hf main --force
