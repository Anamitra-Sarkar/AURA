name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "aura-sync-bot@github.com"
          git config --global user.name "AURA Sync Bot"
          git remote add hf https://Arko007:${HF_TOKEN}@huggingface.co/spaces/Arko007/AI-agent
          git push hf main --force
